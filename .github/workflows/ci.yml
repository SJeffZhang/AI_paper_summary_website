name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  backend-tests:
    name: backend-tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-test.txt

      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements.txt -r backend/requirements-test.txt

      - name: Run backend and smoke tests
        run: |
          set -euo pipefail
          cd backend
          python -m pytest ../tests/backend ../tests/smoke 2>&1 | tee "${RUNNER_TEMP}/backend-tests.log"

      - name: Upload backend test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-tests-log
          path: ${{ runner.temp }}/backend-tests.log
          if-no-files-found: ignore

  live-tests:
    name: live-tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-test.txt

      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements.txt -r backend/requirements-test.txt

      - name: Run live crawler tests
        run: |
          set -euo pipefail
          cd backend
          python -m pytest ../tests/live 2>&1 | tee "${RUNNER_TEMP}/live-tests.log"

      - name: Upload live test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-tests-log
          path: ${{ runner.temp }}/live-tests.log
          if-no-files-found: ignore

  frontend-tests:
    name: frontend-tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Run frontend tests
        run: |
          set -euo pipefail
          npm run test:run 2>&1 | tee "${RUNNER_TEMP}/frontend-tests.log"
        working-directory: frontend

      - name: Build frontend
        run: |
          set -euo pipefail
          npm run build 2>&1 | tee "${RUNNER_TEMP}/frontend-build.log"
        working-directory: frontend

      - name: Upload frontend logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-logs
          path: |
            ${{ runner.temp }}/frontend-tests.log
            ${{ runner.temp }}/frontend-build.log
          if-no-files-found: ignore
